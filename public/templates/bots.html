<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bots Crawler</title>

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #fff;
            text-align: center;
            padding: 30px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            text-align: left;
            max-width: 800px;
            margin-inline: auto;
            background: #222;
            padding: 20px;
            border-radius: 10px;
        }

        .item {
            border-bottom: 1px solid #444;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <h1>🚀 Bots Crawler</h1>

    <button onclick="startCrawler()">Start Crawling</button>

    <div id="status"></div>

    <div id="output"></div>

    <script>
        async function startCrawler() {
            document.getElementById("status").innerHTML = "⏳ Crawling started...";
            document.getElementById("output").innerHTML = "";

            try {
                const res = await fetch("/api/bots?sr=json");
                const data = await res.json();

                document.getElementById("status").innerHTML =
                    "✅ Completed | Total: " + data.total;

                let html = "";

                data.data.forEach(item => {
                    html += `
                        <div class="item">
                            <b>URL:</b> ${item.url} <br>
                            <b>Links Found:</b> ${item.links_found}
                        </div>
                    `;
                });

                document.getElementById("output").innerHTML = html;

            } catch (err) {
                document.getElementById("status").innerHTML = "❌ Error!";
            }
        }
    </script>

</body>
</html>
