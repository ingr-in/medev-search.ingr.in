# render.yaml
services:
  - type: web
    name: python.ingr.in
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: App_Icon
       value: https://chitram.ingr.in/favicon_io/logov2.png
